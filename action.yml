name: 'Veracode Create Teams'
description:
  'Automatically create and manage Veracode teams based on repository
  configuration'
author: 'William Sanders'

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: 'users'
  color: 'blue'

# Define your inputs here.
inputs:
  github-token:
    description: 'GitHub token with repo access'
    required: true

  veracode-api-id:
    description: 'Veracode API ID for authentication'
    required: true

  veracode-api-key:
    description: 'Veracode API Key for authentication'
    required: true

  repository:
    description: 'GitHub repository name'
    required: true

  owner:
    description: 'GitHub repository owner'
    required: true

  config-repository:
    description: 'Repository containing team mapping configuration'
    required: false
    default: veracode

  config-ref:
    description: 'Branch, tag, or commit SHA for config repository'
    required: false

  veracode-team-mapping-yaml:
    description: 'Path to team mapping YAML file'
    required: false
    default: 'team-mapping.yaml'

  veracode-region:
    description: 'Veracode region (US, EU, or FEDERAL)'
    required: false
    default: 'US'

# Define your outputs here.
outputs:
  team-id:
    description: 'UUID of the created/updated team'

  team-name:
    description: 'Name of the created/updated team'

  team-legacy-id:
    description: 'Legacy ID of the team in Veracode database'

  action-taken:
    description: 'Action performed: created or updated'

  member-count:
    description: 'Number of members in the team'

  members-added:
    description: 'Number of members successfully added/validated'

  members-skipped:
    description: 'Number of members skipped (not found in Veracode)'

  skipped-users:
    description: 'Comma-separated list of users that were skipped'

runs:
  using: node24
  main: dist/index.js
