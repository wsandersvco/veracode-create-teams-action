name: Dependabot Build Dist

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-dist:
    name: Build dist/ for Dependabot
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Build dist/ Directory
        id: build
        run: npm run bundle

      - name: Commit Updated dist/
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild dist/ after dependency updates'
          file_pattern: 'dist/*'
